  <circle cx="100" cy="35" r="18" fill="#FBBF24"/>
  <!-- Sunglasses -->
  <rect x="85" y="31" width="12" height="7" rx="3" fill="#1E293B" opacity="0.7"/>
  <rect x="100" y="31" width="12" height="7" rx="3" fill="#1E293B" opacity="0.7"/>
  <line x1="97" y1="34" x2="100" y2="34" stroke="#1E293B" stroke-width="1"/>
  <!-- T-shirt (white/light) -->
  <path d="M75 60 L70 78 L90 82 L90 115 L110 115 L110 82 L130 78 L125 60 L110 55 L100 65 L90 55 Z" fill="#E2E8F0"/>
  <!-- Shorts (light blue) -->
  <rect x="88" y="115" width="10" height="35" rx="2" fill="#93C5FD"/>
  <rect x="102" y="115" width="10" height="35" rx="2" fill="#93C5FD"/>
  <!-- Legs -->
  <rect x="88" y="150" width="10" height="40" rx="2" fill="#FBBF24"/>
  <rect x="102" y="150" width="10" height="40" rx="2" fill="#FBBF24"/>
  <!-- Sneakers -->
  <rect x="85" y="188" width="16" height="8" rx="4" fill="#1E293B"/>
  <rect x="99" y="188" width="16" height="8" rx="4" fill="#1E293B"/>
  <!-- Sun accent -->
  <circle cx="170" cy="30" r="20" fill="#FFB547" opacity="0.3"/>
  <circle cx="170" cy="30" r="14" fill="#FFB547" opacity="0.4"/>
