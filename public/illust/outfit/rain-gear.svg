<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Rain drops background -->
  <g stroke="#5B8DEE" stroke-width="1.5" stroke-linecap="round" opacity="0.4">
    <line x1="30" y1="10" x2="27" y2="25"/>
    <line x1="50" y1="5" x2="47" y2="20"/>
    <line x1="150" y1="10" x2="147" y2="25"/>
    <line x1="170" y1="5" x2="167" y2="20"/>
    <line x1="20" y1="35" x2="17" y2="50"/>
    <line x1="175" y1="35" x2="172" y2="50"/>
  </g>
  <!-- Hood/hat -->
  <ellipse cx="100" cy="30" rx="24" ry="14" fill="#2563EB"/>
  <!-- Head -->
  <circle cx="100" cy="40" r="16" fill="#FBBF24"/>
  <!-- Rain jacket (blue) -->
  <path d="M72 60 L65 88 L86 93 L86 128 L114 128 L114 93 L135 88 L128 60 L114 53 L100 62 L86 53 Z" fill="#3B82F6"/>
  <!-- Hood extension -->
  <path d="M80 53 Q76 42 84 36 Q100 50 116 36 Q124 42 120 53" fill="#2563EB"/>
  <!-- Rain pants -->
  <rect x="84" y="128" width="13" height="42" rx="2" fill="#1D4ED8"/>
  <rect x="103" y="128" width="13" height="42" rx="2" fill="#1D4ED8"/>
  <!-- Boots (waterproof) -->
  <rect x="81" y="167" width="18" height="14" rx="4" fill="#1E293B"/>
  <rect x="101" y="167" width="18" height="14" rx="4" fill="#1E293B"/>
  <!-- Umbrella -->
  <line x1="155" y1="60" x2="155" y2="130" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  <path d="M120 90 Q140 60 175 80" fill="#7EC8C8" stroke="#5B8DEE" stroke-width="1"/>
</svg>
