<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Rain drops -->
  <g stroke="#93C5FD" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <line x1="28" y1="8" x2="24" y2="24"/>
    <line x1="48" y1="3" x2="44" y2="19"/>
    <line x1="170" y1="8" x2="166" y2="24"/>
    <line x1="185" y1="18" x2="181" y2="34"/>
    <line x1="18" y1="38" x2="14" y2="54"/>
    <line x1="182" y1="42" x2="178" y2="58"/>
  </g>
  <!-- Lighter drops -->
  <g stroke="#BFDBFE" stroke-width="1.5" stroke-linecap="round" opacity="0.4">
    <line x1="38" y1="18" x2="35" y2="30"/>
    <line x1="160" y1="30" x2="157" y2="42"/>
  </g>

  <!-- Hood (bright yellow) -->
  <path d="M78 22 Q80 5 100 4 Q120 5 122 22 Q120 14 100 13 Q80 14 78 22Z" fill="#FCD34D"/>
  <path d="M78 22 Q74 32 78 42 L84 40 Q80 32 84 22Z" fill="#F59E0B" opacity="0.5"/>
  <path d="M122 22 Q126 32 122 42 L116 40 Q120 32 116 22Z" fill="#F59E0B" opacity="0.5"/>
  <!-- Hood brim -->
  <ellipse cx="100" cy="22" rx="26" ry="7" fill="#FBBF24" opacity="0.7"/>
  <!-- Head inside hood -->
  <circle cx="100" cy="32" r="15" fill="#FDBA74"/>
  <!-- Expressive eyes (rain face) -->
  <circle cx="95" cy="30" r="2" fill="#1C1917"/>
  <circle cx="105" cy="30" r="2" fill="#1C1917"/>
  <path d="M96 36 Q100 40 104 36" stroke="#C2410C" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Neck/collar visible -->
  <path d="M94 46 L106 46 L105 53 L95 53Z" fill="#FDBA74"/>

  <!-- Bright yellow rain jacket -->
  <path d="M72 50 L64 78 L82 84 L82 128 L118 128 L118 84 L136 78 L128 50 Q116 44 100 50 Q84 44 72 50Z" fill="#FCD34D"/>
  <!-- Hood connector to jacket -->
  <path d="M80 42 Q78 46 82 50" stroke="#FBBF24" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M120 42 Q122 46 118 50" stroke="#FBBF24" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Rain jacket seams -->
  <line x1="82" y1="70" x2="118" y2="70" stroke="#F59E0B" stroke-width="1.5" opacity="0.5"/>
  <line x1="82" y1="86" x2="118" y2="86" stroke="#F59E0B" stroke-width="1.5" opacity="0.5"/>
  <!-- Front zip -->
  <rect x="98" y="55" width="4" height="68" rx="2" fill="#F59E0B" opacity="0.5"/>
  <!-- Sleeve cuffs -->
  <rect x="64" y="74" width="18" height="5" rx="2" fill="#F59E0B" opacity="0.5"/>
  <rect x="118" y="74" width="18" height="5" rx="2" fill="#F59E0B" opacity="0.5"/>
  <!-- Pocket -->
  <rect x="84" y="108" width="14" height="14" rx="2.5" fill="#F59E0B" opacity="0.4"/>
  <rect x="102" y="108" width="14" height="14" rx="2.5" fill="#F59E0B" opacity="0.4"/>

  <!-- Navy rain pants -->
  <path d="M82 128 L79 180 L98 180 L100 167 L102 180 L121 180 L118 128Z" fill="#1D4ED8"/>
  <line x1="82" y1="135" x2="118" y2="135" stroke="#2563EB" stroke-width="1.5" opacity="0.5"/>

  <!-- Yellow rain boots -->
  <path d="M76 177 L76 196 Q76 208 87 209 L100 209 Q105 208 105 203 L105 177Z" fill="#FCD34D"/>
  <path d="M99 177 L99 196 Q99 208 110 209 L123 209 Q128 208 128 203 L128 177Z" fill="#FCD34D"/>
  <rect x="76" y="177" width="29" height="7" rx="3" fill="#F59E0B"/>
  <rect x="99" y="177" width="29" height="7" rx="3" fill="#F59E0B"/>
  <rect x="76" y="202" width="29" height="6" rx="3" fill="#78350F" opacity="0.3"/>
  <rect x="99" y="202" width="29" height="6" rx="3" fill="#78350F" opacity="0.3"/>

  <!-- Umbrella (teal, compact) -->
  <line x1="152" y1="64" x2="152" y2="148" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
  <path d="M128 100 Q152 66 176 92" fill="#5EEAD4" stroke="#0D9488" stroke-width="1.5"/>
  <path d="M136 93 Q152 74 168 88" fill="#99F6E4" opacity="0.5"/>
  <path d="M152 148 Q154 154 149 157" stroke="#475569" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
