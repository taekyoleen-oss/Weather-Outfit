<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Snowflakes -->
  <circle cx="30" cy="30" r="2.5" fill="#BAE6FD"/>
  <circle cx="170" cy="20" r="2" fill="#BAE6FD"/>
  <circle cx="24" cy="65" r="1.8" fill="#BAE6FD"/>
  <circle cx="176" cy="55" r="2.2" fill="#BAE6FD"/>
  <circle cx="165" cy="80" r="1.5" fill="#BAE6FD" opacity="0.6"/>
  <circle cx="35" cy="80" r="1.5" fill="#BAE6FD" opacity="0.6"/>
  <!-- Snowflake cross hairs -->
  <line x1="30" y1="27" x2="30" y2="33" stroke="#BAE6FD" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="30" x2="33" y2="30" stroke="#BAE6FD" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Beanie -->
  <path d="M82 20 Q82 6 100 4 Q118 6 118 20 Q112 12 100 11 Q88 12 82 20Z" fill="#1E3A5F"/>
  <rect x="82" y="20" width="36" height="8" rx="2" fill="#1D4ED8"/>
  <circle cx="100" cy="8" r="5" fill="#DBEAFE"/>
  <!-- Head -->
  <circle cx="100" cy="30" r="17" fill="#FDBA74"/>
  <!-- Cheeks from cold -->
  <circle cx="90" cy="32" r="5" fill="#FCA5A5" opacity="0.4"/>
  <circle cx="110" cy="32" r="5" fill="#FCA5A5" opacity="0.4"/>

  <!-- Neck scarf covers chin area -->
  <path d="M83 45 Q100 54 117 45 L117 53 Q100 63 83 53Z" fill="#EF4444"/>

  <!-- Navy puffer jacket -->
  <path d="M66 52 L58 82 L79 88 L79 132 L121 132 L121 88 L142 82 L134 52 Q118 45 100 51 Q82 45 66 52Z" fill="#1E3A5F"/>
  <!-- Puffer quilting lines (horizontal) -->
  <line x1="79" y1="64" x2="121" y2="64" stroke="#1D4ED8" stroke-width="1.5" opacity="0.5"/>
  <line x1="79" y1="76" x2="121" y2="76" stroke="#1D4ED8" stroke-width="1.5" opacity="0.5"/>
  <line x1="79" y1="88" x2="121" y2="88" stroke="#1D4ED8" stroke-width="1.5" opacity="0.5"/>
  <line x1="79" y1="100" x2="121" y2="100" stroke="#1D4ED8" stroke-width="1.5" opacity="0.5"/>
  <line x1="79" y1="112" x2="121" y2="112" stroke="#1D4ED8" stroke-width="1.5" opacity="0.5"/>
  <!-- Sleeve quilting -->
  <line x1="66" y1="68" x2="79" y2="72" stroke="#1D4ED8" stroke-width="1" opacity="0.4"/>
  <line x1="66" y1="78" x2="79" y2="82" stroke="#1D4ED8" stroke-width="1" opacity="0.4"/>
  <line x1="121" y1="68" x2="134" y2="64" stroke="#1D4ED8" stroke-width="1" opacity="0.4"/>
  <line x1="121" y1="78" x2="134" y2="74" stroke="#1D4ED8" stroke-width="1" opacity="0.4"/>
  <!-- Center zipper -->
  <rect x="98" y="56" width="4" height="72" rx="2" fill="#1D4ED8" opacity="0.4"/>
  <!-- Zip pull -->
  <rect x="97" y="70" width="6" height="4" rx="1" fill="#60A5FA"/>
  <!-- Collar -->
  <path d="M87 52 Q100 60 113 52" stroke="#1D4ED8" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Gloved hands -->
  <ellipse cx="58" cy="92" rx="10" ry="12" fill="#1E3A5F"/>
  <ellipse cx="142" cy="92" rx="10" ry="12" fill="#1E3A5F"/>
  <!-- Glove cuffs -->
  <rect x="50" y="82" width="16" height="6" rx="3" fill="#1D4ED8" opacity="0.5"/>
  <rect x="134" y="82" width="16" height="6" rx="3" fill="#1D4ED8" opacity="0.5"/>

  <!-- Thermal pants: dark -->
  <path d="M79 132 L76 188 L97 188 L100 174 L103 188 L124 188 L121 132Z" fill="#111827"/>
  <line x1="79" y1="140" x2="121" y2="140" stroke="#1F2937" stroke-width="2" opacity="0.6"/>

  <!-- Winter boots: black chunky -->
  <path d="M72 185 L72 202 Q72 213 84 214 L98 214 Q104 213 104 207 L104 185Z" fill="#1C1917"/>
  <path d="M98 185 L98 202 Q98 213 110 214 L124 214 Q130 213 130 207 L130 185Z" fill="#1C1917"/>
  <rect x="72" y="185" width="32" height="7" rx="3" fill="#292524"/>
  <rect x="98" y="185" width="32" height="7" rx="3" fill="#292524"/>
  <!-- Boot tread -->
  <rect x="72" y="207" width="32" height="5" rx="2" fill="#374151"/>
  <rect x="98" y="207" width="32" height="5" rx="2" fill="#374151"/>
</svg>
