<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Snowflakes -->
  <g fill="#CBD5E1">
    <circle cx="30" cy="30" r="2.5"/><circle cx="170" cy="20" r="2"/><circle cx="25" cy="65" r="1.5"/><circle cx="175" cy="55" r="2"/>
  </g>
  <!-- Beanie -->
  <ellipse cx="100" cy="22" rx="20" ry="12" fill="#7C3AED"/>
  <rect x="80" y="22" width="40" height="7" rx="2" fill="#6D28D9"/>
  <circle cx="100" cy="11" r="5" fill="#DDD6FE"/>
  <!-- Head with scarf -->
  <circle cx="100" cy="40" r="16" fill="#FBBF24"/>
  <rect x="83" y="52" width="34" height="9" rx="5" fill="#EF4444"/>
  <!-- Thick winter jacket (purple) -->
  <path d="M68 62 L62 92 L83 97 L83 130 L117 130 L117 97 L138 92 L132 62 L117 55 L100 65 L83 55 Z" fill="#7C3AED"/>
  <!-- Jacket quilting lines -->
  <line x1="83" y1="72" x2="117" y2="72" stroke="#6D28D9" stroke-width="1.5" opacity="0.5"/>
  <line x1="83" y1="84" x2="117" y2="84" stroke="#6D28D9" stroke-width="1.5" opacity="0.5"/>
  <line x1="83" y1="96" x2="117" y2="96" stroke="#6D28D9" stroke-width="1.5" opacity="0.5"/>
  <!-- Ski pants -->
  <rect x="81" y="130" width="14" height="40" rx="2" fill="#1E293B"/>
  <rect x="105" y="130" width="14" height="40" rx="2" fill="#1E293B"/>
  <!-- Snow boots -->
  <rect x="78" y="168" width="20" height="14" rx="4" fill="#292524"/>
  <rect x="102" y="168" width="20" height="14" rx="4" fill="#292524"/>
  <rect x="78" y="168" width="20" height="5" rx="2" fill="#3F3F46" opacity="0.5"/>
  <rect x="102" y="168" width="20" height="5" rx="2" fill="#3F3F46" opacity="0.5"/>
  <!-- Gloves (hands) -->
  <ellipse cx="62" cy="100" rx="8" ry="10" fill="#6D28D9"/>
  <ellipse cx="138" cy="100" rx="8" ry="10" fill="#6D28D9"/>
</svg>
