<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Heavy snowflakes -->
  <g fill="#DBEAFE">
    <circle cx="26" cy="25" r="3"/>
    <circle cx="174" cy="18" r="2.5"/>
    <circle cx="20" cy="62" r="2"/>
    <circle cx="178" cy="55" r="2.5"/>
    <circle cx="165" cy="85" r="2"/>
    <circle cx="34" cy="90" r="2"/>
  </g>
  <g stroke="#DBEAFE" stroke-width="1.5" stroke-linecap="round">
    <line x1="26" y1="21" x2="26" y2="29"/>
    <line x1="22" y1="25" x2="30" y2="25"/>
    <line x1="174" y1="14" x2="174" y2="22"/>
    <line x1="170" y1="18" x2="178" y2="18"/>
  </g>

  <!-- Beanie: dark slate -->
  <path d="M82 22 Q82 6 100 4 Q118 6 118 22 Q112 13 100 12 Q88 13 82 22Z" fill="#1E293B"/>
  <rect x="82" y="22" width="36" height="8" rx="2" fill="#334155"/>
  <circle cx="100" cy="8" r="6" fill="#CBD5E1"/>
  <!-- Head -->
  <circle cx="100" cy="31" r="17" fill="#FDBA74"/>
  <!-- Cold-flush cheeks -->
  <circle cx="89" cy="34" r="5" fill="#FCA5A5" opacity="0.45"/>
  <circle cx="111" cy="34" r="5" fill="#FCA5A5" opacity="0.45"/>

  <!-- Neck gaiter / scarf: bright red -->
  <path d="M84 46 Q100 57 116 46 L116 55 Q100 64 84 55Z" fill="#EF4444"/>

  <!-- Heavy parka: charcoal -->
  <path d="M66 52 L58 84 L80 90 L80 134 L120 134 L120 90 L142 84 L134 52 Q118 45 100 51 Q82 45 66 52Z" fill="#374151"/>
  <!-- Parka quilting lines -->
  <line x1="80" y1="65" x2="120" y2="65" stroke="#4B5563" stroke-width="2" opacity="0.6"/>
  <line x1="80" y1="78" x2="120" y2="78" stroke="#4B5563" stroke-width="2" opacity="0.6"/>
  <line x1="80" y1="91" x2="120" y2="91" stroke="#4B5563" stroke-width="2" opacity="0.6"/>
  <line x1="80" y1="104" x2="120" y2="104" stroke="#4B5563" stroke-width="2" opacity="0.6"/>
  <line x1="80" y1="117" x2="120" y2="117" stroke="#4B5563" stroke-width="2" opacity="0.6"/>
  <!-- Sleeve quilting -->
  <line x1="66" y1="70" x2="80" y2="74" stroke="#4B5563" stroke-width="1.5" opacity="0.5"/>
  <line x1="66" y1="82" x2="80" y2="86" stroke="#4B5563" stroke-width="1.5" opacity="0.5"/>
  <line x1="120" y1="70" x2="134" y2="66" stroke="#4B5563" stroke-width="1.5" opacity="0.5"/>
  <line x1="120" y1="82" x2="134" y2="78" stroke="#4B5563" stroke-width="1.5" opacity="0.5"/>
  <!-- Front zip -->
  <rect x="98" y="58" width="4" height="72" rx="2" fill="#6B7280" opacity="0.5"/>
  <!-- Fur collar -->
  <path d="M84 52 Q100 60 116 52" stroke="#D1D5DB" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Large pockets with zipper -->
  <rect x="80" y="110" width="16" height="20" rx="3" fill="#4B5563" opacity="0.5"/>
  <rect x="104" y="110" width="16" height="20" rx="3" fill="#4B5563" opacity="0.5"/>
  <line x1="83" y1="110" x2="83" y2="130" stroke="#6B7280" stroke-width="1" opacity="0.7"/>
  <line x1="107" y1="110" x2="107" y2="130" stroke="#6B7280" stroke-width="1" opacity="0.7"/>

  <!-- Gloved hands -->
  <ellipse cx="57" cy="95" rx="11" ry="13" fill="#374151"/>
  <ellipse cx="143" cy="95" rx="11" ry="13" fill="#374151"/>
  <rect x="49" y="84" width="18" height="7" rx="3" fill="#4B5563" opacity="0.7"/>
  <rect x="133" y="84" width="18" height="7" rx="3" fill="#4B5563" opacity="0.7"/>
  <!-- Glove detail -->
  <line x1="54" y1="93" x2="68" y2="93" stroke="#6B7280" stroke-width="1" opacity="0.5"/>
  <line x1="132" y1="93" x2="146" y2="93" stroke="#6B7280" stroke-width="1" opacity="0.5"/>

  <!-- Insulated pants: dark navy -->
  <path d="M80 134 L77 190 L98 190 L100 176 L102 190 L123 190 L120 134Z" fill="#1E293B"/>
  <line x1="80" y1="143" x2="120" y2="143" stroke="#334155" stroke-width="2" opacity="0.6"/>
  <line x1="80" y1="158" x2="120" y2="158" stroke="#334155" stroke-width="2" opacity="0.5"/>

  <!-- Snow boots: chunky dark -->
  <path d="M73 187 L73 206 Q73 216 85 217 L99 217 Q106 216 106 210 L106 187Z" fill="#1C1917"/>
  <path d="M98 187 L98 206 Q98 216 110 217 L124 217 Q131 216 131 210 L131 187Z" fill="#1C1917"/>
  <rect x="73" y="187" width="33" height="8" rx="4" fill="#292524"/>
  <rect x="98" y="187" width="33" height="8" rx="4" fill="#292524"/>
  <!-- Lacing detail -->
  <line x1="80" y1="196" x2="99" y2="196" stroke="#374151" stroke-width="1.5"/>
  <line x1="105" y1="196" x2="124" y2="196" stroke="#374151" stroke-width="1.5"/>
  <line x1="80" y1="204" x2="99" y2="204" stroke="#374151" stroke-width="1.5"/>
  <line x1="105" y1="204" x2="124" y2="204" stroke="#374151" stroke-width="1.5"/>
</svg>
