<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Golf cap -->
  <ellipse cx="100" cy="25" rx="22" ry="10" fill="#166534"/>
  <rect x="78" y="25" width="44" height="8" rx="2" fill="#15803D"/>
  <rect x="99" y="32" width="22" height="4" rx="2" fill="#166534"/>
  <!-- Head -->
  <circle cx="100" cy="42" r="16" fill="#FBBF24"/>
  <!-- Polo shirt (white with collar) -->
  <path d="M76 63 L70 85 L88 89 L88 120 L112 120 L112 89 L130 85 L124 63 L112 57 L100 66 L88 57 Z" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Collar details -->
  <path d="M90 58 L100 68 L110 58" stroke="#CBD5E1" stroke-width="2" fill="none"/>
  <!-- Polo stripe accent -->
  <rect x="70" y="74" width="60" height="3" fill="#166534" opacity="0.3"/>
  <!-- Golf pants (khaki) -->
  <rect x="86" y="120" width="12" height="43" rx="2" fill="#D97706" opacity="0.6"/>
  <rect x="102" y="120" width="12" height="43" rx="2" fill="#D97706" opacity="0.6"/>
  <!-- Belt -->
  <rect x="86" y="118" width="28" height="4" rx="1" fill="#92400E"/>
  <!-- Golf shoes -->
  <rect x="83" y="161" width="18" height="9" rx="4" fill="#1C1917"/>
  <rect x="99" y="161" width="18" height="9" rx="4" fill="#1C1917"/>
  <!-- Golf club -->
  <line x1="145" y1="55" x2="145" y2="185" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="145" cy="188" rx="8" ry="4" fill="#64748B"/>
  <!-- Golf ball -->
  <circle cx="145" cy="196" r="4" fill="white" stroke="#E2E8F0" stroke-width="0.5"/>
</svg>
