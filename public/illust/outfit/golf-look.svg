<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Gentle green course hint -->
  <path d="M0 210 Q50 202 100 210 Q150 218 200 210 L200 240 L0 240Z" fill="#86EFAC" opacity="0.3"/>
  <!-- Flag -->
  <line x1="162" y1="70" x2="162" y2="168" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M162 70 L180 80 L162 90Z" fill="#EF4444"/>

  <!-- Golf cap: forest green -->
  <path d="M80 24 Q80 10 100 8 Q120 10 120 24 Q113 15 100 14 Q87 15 80 24Z" fill="#166534"/>
  <rect x="80" y="24" width="40" height="9" rx="2" fill="#15803D"/>
  <!-- Cap brim -->
  <path d="M80 32 Q90 36 100 36 Q110 36 120 32 L118 34 Q110 39 100 39 Q90 39 82 34Z" fill="#166534"/>
  <!-- Cap button on top -->
  <circle cx="100" cy="11" r="3" fill="#14532D"/>
  <!-- Cap logo emblem -->
  <circle cx="100" cy="25" r="4" fill="#14532D" opacity="0.5"/>

  <!-- Hair (short, neat) -->
  <path d="M82 26 Q81 16 100 14 Q119 16 118 26 Q113 20 100 19 Q87 20 82 26Z" fill="#292524"/>
  <!-- Head -->
  <circle cx="100" cy="32" r="16" fill="#FDBA74"/>
  <!-- Professional expression -->
  <path d="M96 37 Q100 40 104 37" stroke="#C2410C" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Neck -->
  <path d="M95 47 L105 47 L104 55 L96 55Z" fill="#FDBA74"/>

  <!-- White polo shirt with collar -->
  <path d="M74 55 L68 76 L85 81 L85 122 L115 122 L115 81 L132 76 L126 55 Q113 49 100 54 Q87 49 74 55Z" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Polo collar (stiff, visible) -->
  <path d="M88 54 L88 62 L93 60 L100 65 L107 60 L112 62 L112 54" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="0.5"/>
  <!-- Polo front placket -->
  <rect x="98" y="65" width="4" height="50" fill="#F1F5F9" opacity="0.7"/>
  <!-- Polo buttons -->
  <circle cx="100" cy="70" r="1.8" fill="#CBD5E1"/>
  <circle cx="100" cy="80" r="1.8" fill="#CBD5E1"/>
  <circle cx="100" cy="90" r="1.8" fill="#CBD5E1"/>
  <!-- Green trim stripes on sleeves -->
  <rect x="68" y="72" width="17" height="4" fill="#15803D" opacity="0.4"/>
  <rect x="115" y="72" width="17" height="4" fill="#15803D" opacity="0.4"/>
  <!-- Polo chest pocket -->
  <rect x="86" y="72" width="10" height="9" rx="1.5" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="0.5"/>
  <!-- Brand logo placeholder -->
  <circle cx="91" cy="76" r="2.5" fill="#15803D" opacity="0.6"/>

  <!-- Khaki/light grey golf slacks -->
  <path d="M85 122 L82 178 L98 178 L100 165 L102 178 L118 178 L115 122Z" fill="#D1D5DB"/>
  <!-- Belt -->
  <rect x="85" y="121" width="30" height="6" rx="1.5" fill="#92400E"/>
  <rect x="98" y="121" width="7" height="6" rx="1" fill="#78350F"/>
  <rect x="100" y="122" width="3" height="4" rx="0.5" fill="#92400E"/>
  <!-- Pant crease -->
  <line x1="90" y1="128" x2="88" y2="178" stroke="#9CA3AF" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="128" x2="112" y2="178" stroke="#9CA3AF" stroke-width="1" opacity="0.5"/>

  <!-- Golf glove on left hand -->
  <ellipse cx="66" cy="88" rx="9" ry="11" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1"/>
  <!-- Glove finger lines -->
  <line x1="62" y1="84" x2="62" y2="96" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="66" y1="83" x2="66" y2="96" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="70" y1="84" x2="70" y2="96" stroke="#CBD5E1" stroke-width="1"/>

  <!-- Right bare hand -->
  <ellipse cx="134" cy="88" rx="8" ry="10" fill="#FDBA74"/>

  <!-- White golf shoes -->
  <path d="M79 174 L79 192 Q79 200 90 201 L100 201 Q106 200 106 196 L106 174Z" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <path d="M98 174 L98 192 Q98 200 109 201 L119 201 Q125 200 125 196 L125 174Z" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="79" y="194" width="27" height="5" rx="2.5" fill="#374151"/>
  <rect x="98" y="194" width="27" height="5" rx="2.5" fill="#374151"/>
  <!-- Shoe cleat dots -->
  <circle cx="84" cy="198" r="1" fill="#1F2937" opacity="0.6"/>
  <circle cx="92" cy="200" r="1" fill="#1F2937" opacity="0.6"/>
  <circle cx="103" cy="198" r="1" fill="#1F2937" opacity="0.6"/>
  <circle cx="111" cy="200" r="1" fill="#1F2937" opacity="0.6"/>

  <!-- Golf club (held in right hand) -->
  <line x1="134" y1="92" x2="140" y2="196" stroke="#6B7280" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="141" cy="200" rx="10" ry="5" fill="#475569"/>
  <!-- Golf ball on tee -->
  <circle cx="141" cy="208" r="5" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Dimple -->
  <circle cx="139" cy="207" r="1" fill="#E2E8F0" opacity="0.6"/>
</svg>
