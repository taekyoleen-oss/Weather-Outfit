  <rect x="121" y="76" width="21" height="6" rx="3" fill="#B45309" opacity="0.5"/>

  <!-- Dark slim pants -->
  <path d="M79 130 L76 186 L96 186 L100 172 L104 186 L124 186 L121 130Z" fill="#1E293B"/>
  <line x1="79" y1="137" x2="121" y2="137" stroke="#334155" stroke-width="1.5" opacity="0.5"/>

  <!-- Ankle boots: warm brown -->
  <path d="M73 183 L73 200 Q73 210 84 211 L98 211 Q103 210 103 205 L103 183Z" fill="#78350F"/>
  <path d="M99 183 L99 200 Q99 210 110 211 L124 211 Q129 210 129 205 L129 183Z" fill="#78350F"/>
  <rect x="73" y="183" width="30" height="6" rx="3" fill="#92400E"/>
  <rect x="99" y="183" width="30" height="6" rx="3" fill="#92400E"/>
  <!-- Boot zipper detail -->
  <line x1="80" y1="190" x2="80" y2="208" stroke="#A16207" stroke-width="1" opacity="0.5"/>
  <line x1="106" y1="190" x2="106" y2="208" stroke="#A16207" stroke-width="1" opacity="0.5"/>
