  <ellipse cx="24" cy="56" rx="8" ry="4" fill="#EF4444" opacity="0.5" transform="rotate(-20 24 56)"/>

  <!-- Hair (mid-length) -->
  <path d="M83 25 Q82 6 100 4 Q118 6 117 25 Q112 16 100 15 Q88 16 83 25Z" fill="#1C1917"/>
  <!-- Head -->
  <circle cx="100" cy="29" r="17" fill="#FDBA74"/>
  <!-- Neutral expression -->
