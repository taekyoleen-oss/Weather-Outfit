  <rect x="79" y="103" width="42" height="7" rx="2" fill="#92400E" opacity="0.7"/>
  <rect x="97" y="103" width="6" height="7" rx="1" fill="#78350F"/>
  <!-- Coat buttons -->
  <circle cx="100" cy="82" r="2.5" fill="#B45309"/>
  <circle cx="100" cy="93" r="2.5" fill="#B45309"/>
