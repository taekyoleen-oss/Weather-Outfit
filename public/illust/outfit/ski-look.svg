<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none">
  <!-- Mountain silhouette bg -->
  <path d="M0 180 L55 120 L88 148 L130 100 L200 165 L200 220 L0 220Z" fill="#E0F2FE" opacity="0.35"/>
  <!-- Snow cap on mountain -->
  <path d="M115 100 L130 100 L122 115Z" fill="white" opacity="0.6"/>
  <path d="M42 120 L55 120 L48 135Z" fill="white" opacity="0.5"/>
  <!-- Snowflakes -->
  <circle cx="24" cy="28" r="2" fill="#DBEAFE"/>
  <circle cx="178" cy="22" r="2.5" fill="#DBEAFE"/>
  <circle cx="20" cy="68" r="1.8" fill="#DBEAFE"/>

  <!-- Ski helmet (dark) -->
  <path d="M82 22 Q82 5 100 4 Q118 5 118 22 Q112 12 100 11 Q88 12 82 22Z" fill="#1E293B"/>
  <rect x="82" y="22" width="36" height="7" rx="2" fill="#334155"/>
  <!-- Helmet ventilation -->
  <line x1="88" y1="14" x2="88" y2="20" stroke="#475569" stroke-width="1.5" opacity="0.6"/>
  <line x1="94" y1="12" x2="94" y2="19" stroke="#475569" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="11" x2="100" y2="19" stroke="#475569" stroke-width="1.5" opacity="0.6"/>
  <line x1="106" y1="12" x2="106" y2="19" stroke="#475569" stroke-width="1.5" opacity="0.6"/>
  <line x1="112" y1="14" x2="112" y2="20" stroke="#475569" stroke-width="1.5" opacity="0.6"/>

  <!-- Goggles: orange strap + mirrored lens -->
  <rect x="81" y="27" width="38" height="11" rx="5" fill="#F97316" opacity="0.85"/>
  <ellipse cx="100" cy="32" rx="16" ry="5" fill="#FCD34D" opacity="0.5"/>
  <!-- Goggle reflection -->
  <ellipse cx="94" cy="31" rx="5" ry="2.5" fill="white" opacity="0.3"/>

  <!-- Face (exposed lower half) -->
  <path d="M85 38 Q85 54 100 56 Q115 54 115 38Z" fill="#FDBA74"/>
  <!-- Neck gaiter -->
  <rect x="86" y="54" width="28" height="10" rx="5" fill="#DC2626"/>

  <!-- Ski jacket: red with black accents -->
  <path d="M66 60 L58 90 L79 96 L79 132 L121 132 L121 96 L142 90 L134 60 Q118 53 100 59 Q82 53 66 60Z" fill="#DC2626"/>
  <!-- Jacket shoulder panels (black) -->
  <path d="M66 60 L58 90 L76 94 L76 76Z" fill="#1F2937" opacity="0.5"/>
  <path d="M134 60 L142 90 L124 94 L124 76Z" fill="#1F2937" opacity="0.5"/>
  <!-- Jacket seam lines -->
  <line x1="79" y1="80" x2="121" y2="80" stroke="#B91C1C" stroke-width="2" opacity="0.4"/>
  <line x1="79" y1="96" x2="121" y2="96" stroke="#B91C1C" stroke-width="2" opacity="0.4"/>
  <!-- Chest pockets -->
  <rect x="82" y="68" width="14" height="10" rx="2" fill="#B91C1C" opacity="0.5"/>
  <rect x="104" y="68" width="14" height="10" rx="2" fill="#B91C1C" opacity="0.5"/>
  <!-- Front zip -->
  <rect x="98" y="64" width="4" height="64" rx="2" fill="#9F1239" opacity="0.4"/>
  <!-- Zip pull -->
  <rect x="97" y="80" width="6" height="4" rx="1" fill="#FCA5A5"/>

  <!-- Gloves (red) -->
  <ellipse cx="57" cy="100" rx="12" ry="14" fill="#DC2626"/>
  <ellipse cx="143" cy="100" rx="12" ry="14" fill="#DC2626"/>
  <line x1="48" y1="90" x2="66" y2="90" stroke="#B91C1C" stroke-width="3" stroke-linecap="round"/>
  <line x1="134" y1="90" x2="152" y2="90" stroke="#B91C1C" stroke-width="3" stroke-linecap="round"/>

  <!-- Ski pants (black/navy) -->
  <path d="M79 132 L76 186 L98 186 L100 172 L102 186 L124 186 L121 132Z" fill="#1F2937"/>
  <line x1="79" y1="142" x2="121" y2="142" stroke="#374151" stroke-width="2" opacity="0.6"/>
  <!-- Side stripe on pants -->
  <line x1="79" y1="132" x2="76" y2="186" stroke="#DC2626" stroke-width="2.5" opacity="0.5"/>
  <line x1="121" y1="132" x2="124" y2="186" stroke="#DC2626" stroke-width="2.5" opacity="0.5"/>

  <!-- Ski boots (stiff, dark) -->
  <path d="M72 183 L72 202 Q72 210 84 211 L100 211 Q106 210 106 205 L106 183Z" fill="#111827"/>
  <path d="M98 183 L98 202 Q98 210 110 211 L126 211 Q132 210 132 205 L132 183Z" fill="#111827"/>
  <rect x="72" y="183" width="34" height="8" rx="4" fill="#1F2937"/>
  <rect x="98" y="183" width="34" height="8" rx="4" fill="#1F2937"/>
  <!-- Boot buckles -->
  <rect x="80" y="194" width="18" height="3" rx="1" fill="#374151"/>
  <rect x="106" y="194" width="18" height="3" rx="1" fill="#374151"/>
  <rect x="80" y="202" width="18" height="3" rx="1" fill="#374151"/>
  <rect x="106" y="202" width="18" height="3" rx="1" fill="#374151"/>

  <!-- Skis -->
  <rect x="62" y="209" width="48" height="5" rx="2.5" fill="#475569"/>
  <rect x="90" y="209" width="48" height="5" rx="2.5" fill="#475569"/>
  <!-- Ski tip curve -->
  <path d="M62 211 Q60 209 62 207" stroke="#475569" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M90 211 Q88 209 90 207" stroke="#475569" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Poles -->
  <line x1="52" y1="96" x2="48" y2="190" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="148" y1="96" x2="152" y2="190" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pole baskets -->
  <circle cx="48" cy="192" r="5" fill="none" stroke="#94A3B8" stroke-width="2"/>
  <circle cx="152" cy="192" r="5" fill="none" stroke="#94A3B8" stroke-width="2"/>
</svg>
